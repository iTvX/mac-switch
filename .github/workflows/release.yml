name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: mac-switch-release
  cancel-in-progress: false

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: [self-hosted, macOS, ARM64, mac-switch-release]
    timeout-minutes: 90

    steps:
      - name: Check out release source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          create_tag=false
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            create_tag=true
            short_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
            if [[ ! "$short_version" =~ ^[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::CFBundleShortVersionString must look like 1.0.0 or 1.0.0-beta.1"
              exit 1
            fi

            tag="v${short_version}-$(date -u +%Y%m%d%H%M%S)"
            while git rev-parse -q --verify "refs/tags/$tag" >/dev/null; do
              sleep 1
              tag="v${short_version}-$(date -u +%Y%m%d%H%M%S)"
            done
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must look like v1.0.0 or v1.0.0-beta.1"
            exit 1
          fi

          if [[ "$create_tag" == "true" ]]; then
            if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
              echo "::error::Generated release tag $tag already exists on origin"
              exit 1
            fi
            tag_commit="$GITHUB_SHA"
          else
            git rev-parse -q --verify "refs/tags/$tag" >/dev/null
            tag_commit="$(git rev-list -n 1 "$tag")"
          fi

          default_branch="${GITHUB_DEFAULT_BRANCH:-main}"
          git fetch --no-tags origin "refs/heads/$default_branch:refs/remotes/origin/$default_branch"
          if ! git merge-base --is-ancestor "$tag_commit" "origin/$default_branch"; then
            echo "::error::Release tag $tag must point to a commit reachable from $default_branch"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "create_tag=$create_tag" >> "$GITHUB_OUTPUT"

      - name: Run Swift tests
        run: |
          swift test \
            --skip PackageSmokeTests/testUISmokeModeOpensPreferencesWindow \
            --skip PackageSmokeTests/testDashboardSmokeModeOpensDashboardWindow \
            --skip PackageSmokeTests/testSafeSelfTestExecutablePasses

      - name: Build, sign, and notarize
        env:
          NOTARY_PROFILE: mac-switch-notary
          SPARKLE_ACCOUNT: com.maxyu.macswitch.sparkle
          CODESIGN_VIA_LAUNCHCTL: "1"
          SU_FEED_URL: https://github.com/${{ github.repository }}/releases/download/appcast/appcast.xml
          MAC_SWITCH_FEEDBACK_URL: ${{ vars.MAC_SWITCH_FEEDBACK_URL }}
        run: ./Scripts/build_release.sh

      - name: Verify release bundle
        env:
          NOTARY_PROFILE: mac-switch-notary
        run: ./Scripts/check_release_ready.sh

      - name: Publish generated release tag
        if: steps.release_tag.outputs.create_tag == 'true'
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Generated release tag $RELEASE_TAG already exists on origin"
            exit 1
          fi
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Upload GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
        shell: bash
        run: |
          set -euo pipefail
          asset="Build/Mac Switch.zip#Mac.Switch.zip"
          release_args=(--title "Mac Switch $RELEASE_TAG" --generate-notes)
          if [[ "$PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$asset" --clobber
          else
            gh release create "$RELEASE_TAG" "$asset" "${release_args[@]}"
          fi

      - name: Generate Sparkle appcast
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          SPARKLE_ACCOUNT: com.maxyu.macswitch.sparkle
        run: ./Scripts/generate_appcast.sh

      - name: Publish Sparkle appcast
        env:
          GH_TOKEN: ${{ github.token }}
          APPCAST_RELEASE_TAG: appcast
        run: ./Scripts/publish_appcast.sh
