name: PR Check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-tests:
    name: Swift tests
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Run Swift tests
        run: swift test

      - name: Validate release scripts
        run: bash -n Scripts/build_release.sh Scripts/check_release_ready.sh Scripts/generate_appcast.sh Scripts/publish_appcast.sh
